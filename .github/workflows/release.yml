name: Release (desktop bundles)

# On a tag push (v*), build the macOS (Apple Silicon) desktop bundle and attach
# the DMG to the GitHub Release. Unsigned — no Apple cert configured — so the
# app needs a one-time right-click → Open on first launch (see docs/packaging.md
# for enabling signing + notarization + other platforms).
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  bundle:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop/src-tauri
      - uses: actions/setup-node@v4
        with: { node-version: 20 }
      - run: npm install
        working-directory: apps/desktop
      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: apps/desktop
          args: --target aarch64-apple-darwin
          tagName: ${{ github.ref_name }}
          releaseName: "BudgetCut ${{ github.ref_name }}"
          releaseBody: "macOS (Apple Silicon) DMG. İlk açılışta sağ tık → Aç (imzasız derleme)."
          releaseDraft: false
          prerelease: false
